# Timeout: prevent python/git timing out on Windows (default 500ms is too low)
command_timeout = 1500

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

palette = "catppuccin_mocha"

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$fill\
$time\
$cmd_duration\
$jobs\
$line_break\
$status\
$character"""

# ── Catppuccin Mocha palette (matches WezTerm) ──
[palettes.catppuccin_mocha]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

# ── Modules ──
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "

[character]
success_symbol = "[▶](bold fg:green)"
error_symbol = "[▶](bold fg:red)"

[os]
format = "[$symbol](bold fg:blue)"
disabled = false

[os.symbols]
Windows = " "

[directory]
format = "[$path]($style)"
style = "bold fg:lavender"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
home_symbol = "~"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style)"
style = "bold fg:green"
truncation_length = 20

[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold fg:yellow"
conflicted = "= "
ahead = "⇡ "
behind = "⇣ "
diverged = "⇕ "
untracked = "? "
stashed = "◆ "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

[python]
symbol = " "
format = "[$symbol]($style)"
style = "fg:yellow"
detect_extensions = ["py"]
detect_files = [".python-version", "pyproject.toml", "requirements.txt", "setup.py", "Pipfile"]

[nodejs]
symbol = " "
format = "[$symbol]($style)"
style = "fg:green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[rust]
symbol = " "
format = "[$symbol]($style)"
style = "fg:peach"
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "[$symbol]($style)"
style = "fg:sky"
detect_files = ["go.mod", "go.sum"]

[java]
symbol = " "
format = "[$symbol]($style)"
style = "fg:peach"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "settings.gradle"]

[cmd_duration]
min_time = 2000
format = "[⚡$duration]($style)"
style = "bold fg:peach"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M"
style = "fg:overlay1"

[status]
format = "[✖ $status]($style)"
style = "bold fg:red"
disabled = false

[jobs]
symbol = "⚙ "
format = "[$symbol$number]($style)"
style = "bold fg:overlay1"
threshold = 1

[fill]
symbol = " "
