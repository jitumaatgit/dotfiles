# Increase timeout to avoid python/other slow commands causing warnings
command_timeout = 1500

# Disable the problematic python module (causing the timeout)
# Re-enable if you need it, but it scans for virtualenvs on dir change
python = { disabled = true }

# --- Prompt format ---
format = """
[](#9A348E)\
$os\
$username\
[](bg:#DA627D fg:#9A348E)\
$directory\
[](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[](fg:#FCA17D bg:#86BBD8)\
$nodejs\
$rust\
$golang\
$java\
[](fg:#86BBD8 bg:#06969A)\
$docker_context\
[](fg:#06969A bg:#33658A)\
$time\
[](fg:#33658A)\
$fill\
$cmd_duration\
$line_break\
$character"""

# --- Modules ---
[character]
success_symbol = "[▶](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[◆](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold"

[git_branch]
format = "[$symbol$branch]($style)"
style = "bold"

[git_status]
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "📦"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"
style = "bold"

[nodejs]
format = "via [⬢ $version](bold green)"
detect_extensions = ["js", "ts", "json"]
detect_files = ["package.json"]
detect_folders = ["node_modules"]

[rust]
format = "via [🦀 $version](bold red)"

[golang]
format = "via [🐹 $version](bold cyan)"

[java]
format = "via [☕ $version](bold orange)"

[docker_context]
format = "via [🐳 $context](bold blue)"

[cmd_duration]
min_time = 2000
show_milliseconds = false
style = "bold"

[time]
disabled = false
format = "🕐 $time"
time_format = "%H:%M"
style = "bold"
