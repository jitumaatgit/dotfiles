command_timeout = 1500
add_newline = true
palette = "catppuccin_mocha"
follow_symlinks = true

format = """
$os\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$kotlin\
$lua\
$terraform\
$gcloud\
$env_var\
$fill\
$time\
battery\
$cmd_duration\
$jobs\
$memory_usage\
$line_break\
$character"""

# TODO configure memory usage, battery, jobs, and I think env_var modules
# I disabled them all for now.

# ── Catppuccin Mocha palette (matches WezTerm) ──
[palettes.catppuccin_mocha]
rosewater = "#f4dbd6"
flamingo = "#f0c6c6"
pink = "#f5bde6"
mauve = "#c6a0f6"
red = "#ed8796"
maroon = "#ee99a0"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sky = "#91d7e3"
sapphire = "#7dc4e4"
blue = "#8aadf4"
lavender = "#b7bdf8"
text = "#cad3f5"
subtext1 = "#b8c0e0"
subtext0 = "#a5adcb"
overlay2 = "#939ab7"
overlay1 = "#8087a2"
overlay0 = "#6e738d"
surface2 = "#5b6078"
surface1 = "#494d64"
surface0 = "#363a4f"
base = "#24273a"
mantle = "#1e2030"
crust = "#181926"

# ── Modules ──

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[os]
format = "[$symbol](bold fg:blue)"
disabled = true

[os.symbols]
Windows = " "

[directory]
format = "[$path]($style) "
style = "fg:bold sky"
truncation_length = 4
fish_style_pwd_dir_length = 3
home_symbol = "~"

[git_branch]
symbol = "($style) "
format = "on [$symbol$branch]($style) "
style = "fg:bold pink"
truncation_length = 20

[git_status]
format = "([$all_status$ahead_behind]($style))"
style = "bold red"
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "◆ "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[python]
symbol = " "
format = "via [$symbol]($style) "
style = "bold yellow"
detect_extensions = ["py"]
detect_files = [
  ".python-version",
  "pyproject.toml",
  "requirements.txt",
  "setup.py",
  "Pipfile"
]

[nodejs]
symbol = " "
format = "via [$symbol]($style) "
style = "bold green"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[rust]
symbol = " "
format = "via [$symbol]($style) "
style = "bold red"
detect_files = ["Cargo.toml"]

[golang]
symbol = " "
format = "via [$symbol]($style) "
style = "bold cyan"
detect_files = ["go.mod", "go.sum"]

[java]
symbol = " "
format = "via [$symbol]($style) "
style = "bold dimmed red"
detect_files = [
  "pom.xml",
  "build.gradle",
  "build.gradle.kts",
  "settings.gradle"
]

[cmd_duration]
min_time = 2000
format = "[⚡$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style) "
time_format = "%H:%M"
style = "fg:overlay1"

[status]
format = "[✖ $status]($style)"
style = "bold red"
disabled = true

[jobs]
disabled = true
symbol = "⚙ "
format = "[$symbol$number]($style) "
style = "bold fg:overlay1"
threshold = 1

[fill]
symbol = " "

[battery]
disabled = true
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol = "󰂑 "
empty_symbol = "󰂎 "
